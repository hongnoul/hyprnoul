background {
    monitor =
    path = ~/Pictures/jh.png
    blur_passes = 3
    blur_size = 6
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 64
    position = 0, 80
    halign = center
    valign = center
}
